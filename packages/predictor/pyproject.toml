[project]
name = "fcip-predictor"
version = "0.1.0"
requires-python = ">=3.12"
description = "FCIP prediction engine"
dependencies = [
    "fcip-shared",
    "scikit-learn>=1.4",
    "pandas>=2.2",
    "numpy>=1.26",
    "joblib>=1.3",
]

[tool.uv.sources]
fcip-shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
