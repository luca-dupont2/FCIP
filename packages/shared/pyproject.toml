[project]
name = "fcip-shared"
version = "0.1.0"
requires-python = ">=3.12"
description = "FCIP shared utilities"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "pydantic-settings>=2.0",
    "structlog>=24.0",
    "alembic>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
