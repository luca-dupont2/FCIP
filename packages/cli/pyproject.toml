[project]
name = "fcip-cli"
version = "0.1.0"
requires-python = ">=3.12"
description = "FCIP command-line interface"
dependencies = [
    "fcip-shared",
    "fcip-parsers",
    "typer>=0.9",
    "httpx>=0.27",
    "rich>=13.0",
    "psutil>=6.0",
]

[tool.uv.sources]
fcip-shared = { workspace = true }
fcip-parsers = { workspace = true }

[project.scripts]
fcip = "fcip_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
