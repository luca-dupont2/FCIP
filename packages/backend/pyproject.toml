[project]
name = "fcip-backend"
version = "0.1.0"
requires-python = ">=3.12"
description = "FCIP backend API"
dependencies = [
    "fcip-shared",
    "fcip-parsers",
    "fcip-predictor",
    "fcip-recommender",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
    "redis[hiredis]>=5.0",
]

[tool.uv.sources]
fcip-shared = { workspace = true }
fcip-parsers = { workspace = true }
fcip-predictor = { workspace = true }
fcip-recommender = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
