services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fcip
      POSTGRES_PASSWORD: fcip
      POSTGRES_DB: fcip
    ports:
      - "5432:5432"
    volumes:
      - fcip_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fcip"]
      interval: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fcip:fcip@postgres:5432/fcip
    volumes:
      - fcip_models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/health')"]
      interval: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  fcip_pgdata:
  fcip_models:
